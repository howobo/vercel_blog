<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      padding: 30px;
      margin-bottom: 30px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .post-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 4px solid #667eea;
    }

    .post-card h3 {
      color: #2d3748;
      font-size: 1.4rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .post-card p {
      color: #4a5568;
      line-height: 1.7;
      font-size: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #718096;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #4a5568;
    }

    .error-message {
      color: #e53e3e;
      padding: 15px 20px;
      background: #fff5f5;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 20px;
      }

      body {
        padding: 20px 15px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>我的博客 🚀</h1>
    <p>记录生活，分享想法</p>
  </header>

  <div class="card">
    <div class="form-group">
      <label for="title">文章标题</label>
      <input id="title" placeholder="输入文章标题...">
    </div>
    <div class="form-group">
      <label for="content">文章内容</label>
      <textarea id="content" placeholder="写下你的想法..."></textarea>
    </div>
    <button onclick="addPost()">发布文章</button>
  </div>

  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://dqwxgienrtgzkyptzonq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxd3hnaWVucnRnemt5cHR6b25xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDM5MTEsImV4cCI6MjA5NzUxOTkxMX0.xIiCYjwAdd_AxEpcYI0AA7ay2dHAcmPyirjDaIUPjOo"
);

async function addPost() {
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();

  if (!title || !content) {
    alert('请填写标题和内容');
    return;
  }

  const { error } = await supabaseClient.from('posts').insert([
    { title, content }
  ]);

  if (error) {
    alert('发布失败: ' + error.message);
    return;
  }

  document.getElementById('title').value = '';
  document.getElementById('content').value = '';

  loadPosts();
}

async function loadPosts() {
  const { data, error } = await supabaseClient
    .from('posts')
    .select('*')
    .order('id', { ascending: false });

  const list = document.getElementById('list');
  list.innerHTML = '';

  if (error) {
    list.innerHTML = `<div class="error-message">加载失败: ${error.message}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
        <h3>暂无文章</h3>
        <p>点击上方发布按钮，写下你的第一篇文章吧！</p>
      </div>
    `;
    return;
  }

  data.forEach(post => {
    list.innerHTML += `
      <div class="post-card">
        <h3>${post.title}</h3>
        <p>${post.content}</p>
      </div>
    `;
  });
}

loadPosts();
</script>

</body>
</html>
